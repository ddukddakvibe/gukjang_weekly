name: 주간 경제뉴스 자동 수집

on:
  schedule:
    # 매주 월요일 오전 9시 KST (= UTC 00:00)
    - cron: '0 0 * * 1'
  # 수동 실행 버튼 (GitHub Actions 탭에서 "Run workflow" 클릭)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 뉴스 수집 & 블로그 업데이트
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python scripts/collect.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # 변경사항 없으면 커밋 생략
          git diff --staged --quiet || git commit -m "📈 주간 경제뉴스 업데이트 $(date +'%Y-%m-%d')"
          git push

      - name: Netlify 배포
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli --silent
          netlify deploy --prod --dir . --auth $NETLIFY_AUTH_TOKEN --site cf54d193-5877-4282-b71d-ee41cabec6aa
